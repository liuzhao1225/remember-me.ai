<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; media-src 'self' https:; font-src 'self' data:; connect-src https://api.github.com; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>{{ page.title | default: site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --bg-deep: #000000;
      --bg-mid: #0a0a0a;
      --bg-surface: rgba(255, 255, 255, 0.06);
      --bg-surface-hover: rgba(255, 255, 255, 0.10);
      --border-subtle: rgba(255, 255, 255, 0.12);
      --border-hover: rgba(255, 255, 255, 0.25);
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --text-muted: #666666;
      --accent-primary: #ffffff;
      --accent-secondary: #cccccc;
      --accent-dim: rgba(255, 255, 255, 0.08);
      --glow-soft: 0 0 20px rgba(255, 255, 255, 0.08);
    }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
      scrollbar-color: rgba(255, 255, 255, 0.28) var(--bg-deep);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.7;
      color: var(--text-primary);
      position: relative;
      isolation: isolate;
      background: var(--bg-deep);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #cosmos-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      contain: strict;
      background: var(--bg-deep);
    }

    #cosmos-canvas canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .page-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--accent-primary); text-decoration: none; transition: color 0.2s, opacity 0.2s; }
    a:hover { color: var(--accent-secondary); text-decoration: none; }
    a:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.45);
      outline-offset: 3px;
    }

    .site-header {
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(0, 0, 0, 0.72);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header .wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .site-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .site-nav a {
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .site-nav a:hover { color: var(--accent-primary); }

    .wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .site-content {
      padding: 2rem 0 4rem;
      flex: 1;
    }

    .site-footer {
      border-top: 1px solid var(--border-subtle);
      padding: 2rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.72);
    }

    /* Markdown content */
    .markdown-body h1 {
      font-size: 1.8rem;
      margin: 2rem 0 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .markdown-body h2 {
      font-size: 1.4rem;
      margin: 1.8rem 0 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .markdown-body h3 {
      font-size: 1.15rem;
      margin: 1.5rem 0 0.6rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .markdown-body p { margin: 0.8rem 0; color: var(--text-primary); }
    .markdown-body ul, .markdown-body ol { margin: 0.8rem 0; padding-left: 2rem; }
    .markdown-body li { margin: 0.3rem 0; }
    .markdown-body blockquote {
      border-left: 3px solid var(--accent-primary);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--text-secondary);
      background: var(--accent-dim);
      border-radius: 0 6px 6px 0;
    }
    .markdown-body code {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
      color: var(--accent-secondary);
      border: 1px solid var(--border-subtle);
    }
    .markdown-body pre {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-subtle);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
    }
    .markdown-body pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--text-primary);
    }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 2rem 0;
    }
    .markdown-body img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
    }
    .markdown-body strong { font-weight: 600; color: var(--text-primary); }
    .markdown-body em { font-style: italic; color: var(--text-secondary); }
    .markdown-body table {
      border-collapse: collapse;
      margin: 1rem 0;
      width: 100%;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border-subtle);
      padding: 0.5rem 0.8rem;
      text-align: left;
    }
    .markdown-body th {
      background: var(--bg-surface);
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Contributor cards */
    .contributor-grid {
      display: grid;
      gap: 1.2rem;
      margin-top: 1.5rem;
    }
    .contributor-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 1.5rem;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .contributor-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .contributor-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--glow-soft);
      background: var(--bg-surface-hover);
    }
    .contributor-card:hover::before { opacity: 1; }
    .contributor-card h3 { margin: 0 0 0.4rem; font-size: 1.15rem; }
    .contributor-card h3 a { color: var(--text-primary); transition: color 0.3s; }
    .contributor-card h3 a:hover { color: var(--accent-primary); }
    .contributor-card .quote { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.6rem; }
    .contributor-card .meta { color: var(--text-muted); font-size: 0.8rem; }
    .contributor-card .meta a { color: var(--text-muted); }
    .contributor-card .meta a:hover { color: var(--accent-primary); }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .github-link {
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: color 0.3s;
    }
    .github-link:hover { color: var(--accent-primary); text-decoration: none; }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .breadcrumb a { color: var(--text-secondary); }
    .breadcrumb a:hover { color: var(--accent-primary); }

    /* Hero */
    .hero {
      text-align: center;
      padding: 4rem 0 3rem;
      position: relative;
    }
    .hero h1 {
      font-size: 2.4rem;
      margin-bottom: 0.8rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .hero .tagline {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 0.8rem;
      line-height: 1.8;
    }
    .hero .cta {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      background: var(--accent-primary);
      color: #000000;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: box-shadow 0.3s, opacity 0.3s;
      letter-spacing: 0.02em;
    }
    .hero .cta:hover {
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.18);
      color: #000000;
      text-decoration: none;
    }

    /* Section headings */
    .site-content > .wrapper > h2 {
      color: var(--text-primary);
      font-size: 1.4rem;
      font-weight: 600;
    }

    /* Links inside markdown content */
    .markdown-body a {
      color: var(--accent-primary);
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.35);
      text-underline-offset: 2px;
      transition: opacity 0.3s, text-decoration-color 0.3s;
    }
    .markdown-body a:hover {
      opacity: 0.7;
      text-decoration-color: rgba(255, 255, 255, 0.72);
    }

    /* Post list in contributor page */
    .post-list {
      list-style: none;
      padding: 0;
    }
    .post-list li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-list li a {
      color: var(--accent-primary);
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.35);
      text-underline-offset: 2px;
      transition: opacity 0.3s, text-decoration-color 0.3s;
    }
    .post-list li a:hover {
      opacity: 0.7;
      text-decoration-color: rgba(255, 255, 255, 0.72);
    }
    .post-list .post-date {
      color: var(--text-muted);
      font-size: 0.82rem;
      white-space: nowrap;
      margin-left: 1.5rem;
      flex-shrink: 0;
    }

    /* Promote section */
    .promote-section {
      margin: 2rem 0 2.5rem;
    }
    .promote-section h2 {
      color: var(--text-primary);
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .promote-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .promote-box {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 1.2rem 1.2rem 1rem;
    }
    .promote-text {
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      background: none;
      border: none;
      padding: 0;
    }
    .copy-btn {
      margin-top: 1rem;
      padding: 0.4rem 1.2rem;
      background: var(--accent-primary);
      color: #000000;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.3s, opacity 0.3s;
      letter-spacing: 0.02em;
    }
    .copy-btn:hover {
      box-shadow: 0 4px 16px rgba(255, 255, 255, 0.16);
    }

    /* Language toggle */
    .lang-toggle {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      font: inherit;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: color 0.3s;
      user-select: none;
    }
    .lang-toggle:hover { color: var(--accent-primary); }

    /* Selection color */
    ::selection {
      background: rgba(255, 255, 255, 0.24);
      color: #ffffff;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.28);
      border: 3px solid var(--bg-deep);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.42); }

    @media print {
      #cosmos-canvas { display: none; }
    }
  </style>
</head>
<body>
  <div id="cosmos-canvas" aria-hidden="true"></div>

  <div class="page-shell">
    <header class="site-header">
      <div class="wrapper">
        <a class="site-title" href="{{ site.baseurl }}/">remember-me.ai</a>
        <nav class="site-nav">
          <button class="lang-toggle" id="lang-toggle" type="button" aria-label="切换为英文界面">EN</button>
          <a href="https://github.com/liuzhao1225/remember-me.ai">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="site-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <span data-i18n="footer">Remember me. 记住我。</span>
      </div>
    </footer>
  </div>

  <script src="{{ site.baseurl }}/assets/cosmos.js" defer></script>
  <script src="{{ site.baseurl }}/assets/site.js" defer></script>
</body>
</html>
